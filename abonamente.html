<!doctype html>
<html>
  <head>
    <title>Smart Inovice | Abonamente</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="Imagini/logoTransparent.png" />
  </head>
  <body>
    <!--Partea fixa-->

    <!--Header-->
    <section id="half1">
      <div id="component1">
        <img id="imgLogo1" src="Imagini/logoTransparent.png" />
        <p id="textLogo1">Smart Inovice</p>
      </div>
      <div id="component2">
        <div id="component2Text">
          <p id="dashboardText">Facturi</p>
          <p id="dashboardText2">Urmăriți și optimizați plățile recurente</p>
        </div>
        <div id="containerHeaderRight">
          <div id="containerSearchBar">
            <div id="searchBar">
              <p id="searchBarSymbol">🔎︎</p>
              <input
                type="text"
                id="searchBarInput"
                placeholder="Caută facturi..."
              />
            </div>
          </div>
          <button id="notificari"></button>
        </div>
      </div>
    </section>
    <section id="half2">
      <!--Bara de navigare-->
      <div id="component3">
        <div class="butonNav notSelected">
          <svg id="svgDashboard" viewBox="0 0 30 30" class="navSVG">
            <rect
              x="5"
              y="5"
              width="8"
              height="12"
              rx="2"
              fill="transparent"
              stroke="hsl(220 9% 46%)"
              stroke-width="2"
            />
            <rect
              x="18"
              y="5"
              width="8"
              height="5"
              rx="2"
              fill="transparent"
              stroke="hsl(220 9% 46%)"
              stroke-width="2"
            />
            <rect
              x="18"
              y="15"
              width="8"
              height="12"
              rx="2"
              fill="transparent"
              stroke="hsl(220 9% 46%)"
              stroke-width="2"
            />
            <rect
              x="5"
              y="22"
              width="8"
              height="5"
              rx="2"
              fill="transparent"
              stroke="hsl(220 9% 46%)"
              stroke-width="2"
            />
          </svg>
          <p class="navText">Dashboard</p>
        </div>
        <div class="butonNav notSelected">
          <svg viewBox="0 0 20 20" class="navSVG">
            <path
              d="
    M 5 5
    Q 7 1 9 5
    Q 11 1 13 5
    Q 15 1 17 5
    L 17 17
    Q 15 19 13 17
    Q 11 19 9 17
    Q 7 19 5 17
    Z

    M 10.5 7
    L 10.5 14

    M 13 8
    Q 13 7 10.5 7
    Q 8 7 8 8.5
    Q 8 10 10.5 10
    Q 13 10 13 11.5
    Q 13 14 10.5 14
    Q 8 14 8 12.5
  "
              fill="transparent"
              stroke="hsl(220 9% 46%)"
              stroke-width="2"
            />
          </svg>
          <p class="navText">Facturi</p>
        </div>
        <div class="butonNav selected">
          <svg viewBox="0 0 20 20" class="navSVG">
            <rect
              x="2.5"
              y="5"
              width="15"
              height="10"
              rx="2"
              ry="2"
              fill="none"
              stroke="rgb(0, 175, 214)"
              stroke-width="2"
            />
            <path
              d="
    M 2 8
    L 18 8
  "
              fill="transparent"
              stroke="rgb(0, 175, 214)"
              stroke-width="2"
            />
          </svg>
          <p class="navText">Abonamente</p>
        </div>
        <div class="butonNav notSelected">
          <svg
            width="24"
            height="24"
            viewBox="0 0 25 25"
            fill="none"
            stroke="hsl(220 9% 46%)"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="22 7 15 15.5 10 10.5 5 17"></polyline>
            <polyline points="16 7 22 7 22 13"></polyline>
          </svg>
          <p class="navText">Sfaturi AI</p>
        </div>
        <div class="butonNav notSelected">
          <svg
            width="24"
            height="24"
            viewBox="-4 -2.5 30 30"
            fill="none"
            stroke="hsl(220 9% 46%)"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"
            ></path>
          </svg>
          <p class="navText">Economii</p>
        </div>
        <div class="butonNav notSelected">
          <svg
            width="24"
            height="24"
            viewBox="-4 -2.5 30 30"
            fill="none"
            stroke="hsl(220 9% 46%)"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"
            ></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <p class="navText">Setări</p>
        </div>

        <button id="restrange">&lt;</button>
      </div>

      <!--Partea mobila-->
      <div id="component4">
        <section class="billsSection" id="abonamenteCifreSection">
          <div class="abonamenteDivCifre">
            <p class="abonamenteTitluCifre">Abonamente active</p>
            <p class="abonamenteSumaCifre">10</p>
          </div>
          <div class="abonamenteDivCifre">
            <p class="abonamenteTitluCifre">Cost lunar</p>
            <p class="abonamenteSumaCifre">10.005,56 RON</p>
          </div>
          <div class="abonamenteDivCifre"
          style="
            background-color:rgb(0, 175, 214, 0.1);
            border-color:rgb(0, 175, 214, 0.3);
            border-style:solid;
            border-width:1px;">
            <p class="abonamenteTitluCifre"
            style="color:hsl(var(--ring));">✔ Economii potențiale</p>
            <p class="abonamenteSumaCifre">200 RON
              <span class="abonamenteSumaCifreAux">/lună</span>
            </p>
          </div>
        </section>
        <section class="billsSection">
            <div class="facturaDiv">
                <div class="facturaHalf1">
                    <p class="logoFactura">🛡️</p>
                    <p class="titluFactura">Titlu Factură<br><span class="furnizorFactura">Furnizor</span></p>
                    <a href="" class="treiPuncteFactura">⋮</a>
                </div>
                <div class="facturaHalf2">
                    <p class="stareFactura stareIntarziat2 stanga">⚠ Întârziat</p>
                    <p class="sumaFactura sumaFacturaPozitie">
                        300 RON<br>
                        <span class="termenLimitaFactura">6 Mai</span>
                    </p>
                </div>
            </div>
        </section>
      </div>
    </section>
    <script src="Scripturi/animatieGrafic.js"></script>
  </body>
</html>
